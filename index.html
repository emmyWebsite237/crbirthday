<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonk Birthday Edit ⚡</title>
    <link rel="preconnect" href="googleapis.com">
    <link rel="preconnect" href="gstatic.com" crossorigin>
    <link href="googleapis.com" rel="stylesheet">
    
    <style>
        /* RESET & CORE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #000;
            font-family: 'Archivo Black', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* INITIAL BLURRED INTRO OVERLAY */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .play-trigger {
            background: #ff0055;
            color: #fff;
            border: 4px solid #fff;
            padding: 20px 50px;
            font-size: 2rem;
            text-transform: uppercase;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 30px #ff0055;
            letter-spacing: 2px;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            transition: transform 0.2s ease;
        }

        .play-trigger:hover {
            transform: scale(1.1) skewX(-5deg);
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 50px #00ffcc;
        }

        /* HIDDEN MEDIA ELEMENTS */
        audio {
            display: none;
        }

        /* VIDEO EDIT CONTAINER */
        .timeline-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
            background: #000;
        }

        /* PHONK GLOBAL FLASH FILTER EFFECT */
        .master-strobe {
            animation: globalFlash 0.3s infinite alternate;
        }

        /* BEAT-SYNCED VIDEO SEGMENTS */
        .clip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        /* HARSH FALLBACK COLORS WHEN IMAGES ARE MISSING */
        .color-fallback-1 { background-color: #ff0055; }
        .color-fallback-2 { background-color: #00ffcc; }
        .color-fallback-3 { background-color: #ffff00; }
        .color-fallback-4 { background-color: #7000ff; }
        .color-fallback-5 { background-color: #ff5500; }

        /* BRUTALIST TYPOGRAPHY TEXT LAYERS */
        .phonk-text {
            font-size: 5rem;
            text-transform: uppercase;
            text-align: center;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -2px;
            font-family: 'Permanent Marker', cursive;
            color: #fff;
            text-shadow: 5px 5px 0px #ff0055, -5px -5px 0px #00ffcc;
            transform: scale(0.5);
        }

        /* SEGMENT SPECIFIC CAPCUT EDIT ANIMATIONS */
        
        /* Clip 1: Drift Phase Zoom Loop */
        .drift-zoom {
            animation: zoomPulse 0.4s infinite ease-in-out, shakeRigid 0.2s infinite;
        }
        .text-pop-1 {
            animation: textGrow 0.4s infinite alternate;
        }

        /* Clip 2: Aggressive Screen Shake Wrap */
        .aggressive-shake {
            animation: hardShake 0.15s infinite linear;
        }
        .text-pop-2 {
            animation: textGlitch 0.2s infinite steps(2);
        }

        /* Clip 3: Extreme Rotation Wobble */
        .wobble-spin {
            animation: crazyWobble 0.3s infinite linear;
        }
        .text-pop-3 {
            animation: textSkew 0.3s infinite linear;
        }

        /* Clip 4: Glitch Bounce Warp */
        .glitch-bounce {
            animation: verticalBounce 0.25s infinite contrast(200%);
        }
        .text-pop-4 {
            animation: strobeText 0.1s infinite;
        }

        /* Clip 5: Finale Outro Extreme Grind */
        .finale-grind {
            animation: ultimateVibe 0.2s infinite, zoomPulse 0.8s infinite;
        }
        .text-pop-5 {
            font-size: 6rem;
            animation: textGrow 0.2s infinite linear;
        }

        /* WATERMARK CAPCUT FOOTER OVERLAY */
        .capcut-watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-left: 3px solid #00ffcc;
            z-index: 10;
        }

        /* ====== COMPLEX CSS KEYFRAMES (400+ LINE BULK) ====== */
        
        @keyframes globalFlash {
            0% { filter: brightness(1) contrast(100%); }
            100% { filter: brightness(1.4) contrast(150%) saturate(200%); }
        }

        @keyframes zoomPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes shakeRigid {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-4px, 4px) rotate(-1deg); }
            40% { transform: translate(-4px, -4px) rotate(1deg); }
            60% { transform: translate(4px, 4px) rotate(0deg); }
            80% { transform: translate(4px, -4px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        @keyframes hardShake {
            0% { transform: translate(0, 0) skewX(0deg); filter: hue-rotate(0deg); }
            25% { transform: translate(-12px, 8px) skewX(-6deg); filter: hue-rotate(90deg); }
            50% { transform: translate(14px, -12px) skewX(8deg); }
            75% { transform: translate(-8px, -6px) skewX(-4deg); filter: hue-rotate(180deg); }
            100% { transform: translate(10px, 10px) skewX(0deg); filter: hue-rotate(360deg); }
        }

        @keyframes crazyWobble {
            0% { transform: scale(1) rotate(0deg); }
            33% { transform: scale(1.2) rotate(-8deg); filter: invert(0); }
            66% { transform: scale(0.9) rotate(8deg); filter: invert(0.1); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes verticalBounce {
            0% { transform: translateY(0) scaleY(1); }
            25% { transform: translateY(-30px) scaleY(1.1); }
            50% { transform: translateY(0) scaleY(0.9); }
            75% { transform: translateY(15px) scaleY(1); }
            100% { transform: translateY(0) scaleY(1); }
        }

        @keyframes ultimateVibe {
            0% { transform: translate(4px, 4px) rotate(1deg) scale(1); }
            50% { transform: translate(-4px, -4px) rotate(-1deg) scale(1.08); filter: saturate(3); }
            100% { transform: translate(4px, -4px) rotate(1deg) scale(1); }
        }

        @keyframes textGrow {
            0% { transform: scale(0.7); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 1; color: #00ffcc; }
        }

        @keyframes textGlitch {
            0% { transform: translate(5px, -2px) skewX(10deg); clip-path: inset(10% 0 30% 0); }
            50% { transform: translate(-5px, 3px) skewX(-10deg); clip-path: inset(40% 0 5% 0); }
            100% { transform: translate(0, 0); clip-path: inset(0); }
        }

        @keyframes textSkew {
            0% { transform: rotate(-5deg) scale(0.9); color: #ffff00; }
            50% { transform: rotate(5deg) scale(1.1); color: #ff0055; }
            100% { transform: rotate(-5deg) scale(0.9); }
        }

        @keyframes strobeText {
            0%, 49% { background: #000; color: #fff; opacity: 1; }
            50%, 100% { background: #fff; color: #000; opacity: 0.9; }
        }
    </style>
</head>
<body>

    <!-- START MONITOR SCREEN OVERLAY -->
    <div id="intro-overlay">
        <h2 style="font-size: 1.5rem; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 4px; color: #888;">Volume Warning 🎧</h2>
        <button class="play-trigger" onclick="startPhonkEdit()">Drop the Beat</button>
    </div>

    <!-- MAIN PHONK EDIT AUDIO SOURCE -->
    <!-- Place your choice phonk track inside this file path -->
    <audio id="phonkTrack" src="birthday-audio.mp3" loop></audio>

    <!-- CAPCUT LIVE COMPACT TIMELINE LAYOUT -->
    <div class="timeline-container master-strobe" id="timeline">
        
        <div class="capcut-watermark">CapCut Web Edit</div>

        <!-- CLIP SECTION 1: Intro Bass Drop -->
        <!-- Replace 'pic1.jpg' with your filename -->
        <div class="clip color-fallback-1 drift-zoom" id="clip1" style="background-image: url('pic1.jpg');">
            <div class="phonk-text text-pop-1">WAKE UP! ✨</div>
        </div>

        <!-- CLIP SECTION 2: Heavy Cowbell Distortion Phase -->
        <!-- Replace 'pic2.png' with your filename -->
        <div class="clip color-fallback-2 aggressive-shake" id="clip2" style="background-image: url('pic2.png');">
            <div class="phonk-text text-pop-2">BIRTHDAY<br>KING 👑</div>
        </div>

        <!-- CLIP SECTION 3: Mid-Track Velocity Curve Switch -->
        <!-- Replace 'pic3.jpg' with your filename -->
        <div class="clip color-fallback-3 wobble-spin" id="clip3" style="background-image: url('pic3.jpg');">
            <div class="phonk-text text-pop-3">LEVELED UP<br>💥💥💥</div>
        </div>

        <!-- CLIP SECTION 4: Glitch Bass Roll Phase -->
        <!-- Replace 'pic4.png' with your filename -->
        <div class="clip color-fallback-4 glitch-bounce" id="clip4" style="background-image: url('pic4.png');">
            <div class="phonk-text text-pop-4">DON'T SLEEP ⚡</div>
        </div>

        <!-- CLIP SECTION 5: Infinite Loop Climax Outro -->
        <!-- Replace 'pic5.jpg' with your filename -->
        <div class="clip color-fallback-5 finale-grind" id="clip5" style="background-image: url('pic5.jpg');">
            <div class="phonk-text text-pop-5">HBD!!! 🔥</div>
        </div>

    </div>

    <!-- TIMELINE VIDEO CONTROL ENGINE -->
    <script>
        const track = document.getElementById('phonkTrack');
        const overlay = document.getElementById('intro-overlay');
        const timeline = document.getElementById('timeline');
        
        const clips = [
            document.getElementById('clip1'),
            document.getElementById('clip2'),
            document.getElementById('clip3'),
            document.getElementById('clip4'),
            document.getElementById('clip5')
        ];

        function startPhonkEdit() {
            // Drop overlay and play sound loop instantly
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
            timeline.style.display = 'block';
            track.play();
            
            // Execute fast beat-cutting loops
            runPhonkSequencer();
        }

        function clearAllClips() {
            clips.forEach(clip => clip.style.display = 'none');
        }

        function runPhonkSequencer() {
            let step = 0;

            // Strict time schedule mimicking a 140BPM Phonk pattern curve
            function playSequenceLoop() {
                clearAllClips();
                
                if (step === 0) {
                    clips[0].style.display = 'flex'; // Intro drift
                    setTimeout(() => { step = 1; playSequenceLoop(); }, 1800);
                } 
                else if (step === 1) {
                    clips[1].style.display = 'flex'; // Bass Drop Shake
                    setTimeout(() => { step = 2; playSequenceLoop(); }, 1400);
                } 
                else if (step === 2) {
                    clips[2].style.display = 'flex'; // Wobble spin curve
                    setTimeout(() => { step = 3; playSequenceLoop(); }, 1600);
                } 
                else if (step === 3) {
                    clips[3].style.display = 'flex'; // Fast stutter bounce
                    setTimeout(() => { step = 4; playSequenceLoop(); }, 1200);
                } 
                else if (step === 4) {
                    clips[4].style.display = 'flex'; // Main finale theme
                    // Loops back to beat phase 1 to act like a continuous TikTok edit loop
                    setTimeout(() => { step = 1; playSequenceLoop(); }, 2500);
                }
            }

            playSequenceLoop();
        }
    </script>
</body>
</html>
