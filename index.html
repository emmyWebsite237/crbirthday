<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Celebration Surprise 🎉</title>
    <link rel="preconnect" href="googleapis.com">
    <link rel="preconnect" href="gstatic.com" crossorigin>
    <link href="googleapis.com" rel="stylesheet">
    
    <style>
        /* GLOBAL RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #0b0c10;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* INTRO START OVERLAY */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f111a;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .play-trigger {
            background: #ff4757;
            color: #fff;
            border: 2px solid #fff;
            padding: 18px 45px;
            font-size: 1.5rem;
            text-transform: uppercase;
            font-weight: 800;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .play-trigger:hover {
            transform: scale(1.05);
            background: #ff6b81;
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.6);
        }

        /* HIDDEN AUDIO ELEMENT */
        audio {
            display: none;
        }

        /* MAIN MEDIA EDIT TIMELINE */
        .timeline-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
            background: #000;
        }

        /* BEAT-SYNCED VIDEO SEGMENTS */
        .clip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        /* RETROFITTED HARSH FALLBACKS */
        .color-fallback-1 { background-color: #ff0055; }
        .color-fallback-2 { background-color: #00ffcc; }
        .color-fallback-3 { background-color: #ffff00; }
        .color-fallback-4 { background-color: #7000ff; }
        .color-fallback-5 { background-color: #ff5500; }

        /* BRUTALIST TYPOGRAPHY TEXT LAYERS */
        .celebration-text {
            font-size: 5rem;
            text-transform: uppercase;
            text-align: center;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -1px;
            font-family: 'Archivo Black', sans-serif;
            color: #fff;
            text-shadow: 4px 4px 0px #ff4757, -4px -4px 0px #2f3542;
        }

        /* CLEAN SPEED MOVEMENT MODIFIERS */
        .smooth-zoom {
            animation: slowZoomPulse 2.4s infinite ease-in-out, subtleWobble 1.2s infinite alternate;
        }
        .text-pop-1 { animation: textScale 1.2s infinite alternate ease-in-out; }

        .distortion-slide {
            animation: fastSlideGlitch 0.35s infinite ease-in-out;
        }
        .text-pop-2 { animation: textStretch 0.35s infinite alternate; }

        .wobble-spin {
            animation: heavyWobble 1.8s infinite linear;
        }
        .text-pop-3 { animation: textScale 0.9s infinite alternate; }

        .heavy-bounce {
            animation: verticalBounce 0.8s infinite ease-in-out;
        }
        .text-pop-4 { animation: textStretch 0.4s infinite alternate; }

        .climax-grind {
            animation: ultimateVibe 0.6s infinite, slowZoomPulse 2s infinite;
        }
        .text-pop-5 { animation: textScale 0.6s infinite alternate; }

        /* COURSE REP SURPRISE BIRTHDAY NOTE */
        #course-rep-card {
            position: absolute;
            top: -100%;
            left: 50%;
            transform: translate(-50%, 0);
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 100;
            opacity: 0;
            display: none;
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #course-rep-card.triggered {
            display: block !important;
            top: 50%;
            transform: translate(-50%, -50%);
            opacity: 1;
        }

        .rep-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .rep-body {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            color: #f1f2f6;
            line-height: 1.4;
            text-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }

        /* ====== KEYFRAME ANIMATION PACK ====== */
        @keyframes slowZoomPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.18); }
            100% { transform: scale(1); }
        }

        @keyframes subtleWobble {
            0% { transform: rotate(-1deg); }
            100% { transform: rotate(1deg); }
        }

        @keyframes fastSlideGlitch {
            0% { transform: translate(0, 0) scale(1.05); filter: contrast(110%); }
            50% { transform: translate(-10px, 8px) scale(1.1); filter: contrast(140%) brightness(1.2); }
            100% { transform: translate(0, 0) scale(1.05); }
        }

        @keyframes heavyWobble {
            0% { transform: scale(1.02) rotate(0deg); }
            33% { transform: scale(1.15) rotate(-6deg); }
            66% { transform: scale(0.98) rotate(6deg); }
            100% { transform: scale(1.02) rotate(0deg); }
        }

        @keyframes verticalBounce {
            0% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(-25px) scaleY(1.05); }
            100% { transform: translateY(0) scaleY(1); }
        }

        @keyframes ultimateVibe {
            0% { transform: translate(4px, 4px) rotate(0.5deg); }
            50% { transform: translate(-4px, -4px) rotate(-0.5deg) scale(1.05); }
            100% { transform: translate(4px, -4px) rotate(0.5deg); }
        }

        @keyframes textScale {
            0% { transform: scale(0.8); opacity: 0.9; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes textStretch {
            0% { transform: scaleX(0.85) scaleY(1.1); }
            100% { transform: scaleX(1.1) scaleY(0.85); }
        }
    </style>
</head>
<body>

    <!-- START DROP SCREEN OVERLAY -->
    <div id="intro-overlay">
        <button class="play-trigger" onclick="startCelebration()">Open Surprise 🎁</button>
    </div>

    <!-- STREAMED MUSIC SOURCE (NO LOCAL UPLOAD REQUIRED) -->
    <audio id="birthdayTrack" src="google.com" loop crossorigin="anonymous"></audio>

    <!-- LIVE TIMELINE LAYOUT -->
    <div class="timeline-container" id="timeline">
        
        <!-- CLIP 1 -->
        <div class="clip color-fallback-1 smooth-zoom" id="clip1" style="background-image: url('pic1.jpeg');">
            <div class="celebration-text text-pop-1">HAPPY<br>BIRTHDAY 🎉</div>
        </div>

        <!-- CLIP 2 -->
        <div class="clip color-fallback-2 distortion-slide" id="clip2" style="background-image: url('pic2.jpeg');">
            <div class="celebration-text text-pop-2">BIG DAY 🎂</div>
        </div>

        <!-- CLIP 3 -->
        <div class="clip color-fallback-3 wobble-spin" id="clip3" style="background-image: url('pic3.jpeg');">
            <div class="celebration-text text-pop-3">CELEBRATE ✨</div>
        </div>

        <!-- CLIP 4 -->
        <div class="clip color-fallback-4 heavy-bounce" id="clip4" style="background-image: url('pic4.jpeg');">
            <div class="celebration-text text-pop-4">SHINE BRIGHT 💎</div>
        </div>

        <!-- CLIP 5 -->
        <div class="clip color-fallback-5 climax-grind" id="clip5" style="background-image: url('pic5.jpeg');">
            <div class="celebration-text text-pop-5">CHEERS 🥂</div>
        </div>

        <!-- COURSE REP FALL & FADE IN TRIBUTE CONTAINER -->
        <div id="course-rep-card">
            <h2 class="rep-title">To Our Course Rep! 👑</h2>
            <p class="rep-body">
                Wishing you long life, immense prosperity, and excellent success in all your academic endeavors. Thank you for your leadership and dedication to the department! Cheers to your new age!
            </p>
        </div>

    </div>

    <!-- TIMELINE VIDEO CONTROL ENGINE -->
    <script>
        const track = document.getElementById('birthdayTrack');
        const overlay = document.getElementById('intro-overlay');
        const timeline = document.getElementById('timeline');
        const repCard = document.getElementById('course-rep-card');
        
        const clips = [
            document.getElementById('clip1'),
            document.getElementById('clip2'),
            document.getElementById('clip3'),
            document.getElementById('clip4'),
            document.getElementById('clip5')
        ];

        function startCelebration() {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 800);
            timeline.style.display = 'block';
            track.play();
            
            runImageSequencer();
            scheduleCourseRepNote();
        }

        function clearAllClips() {
            clips.forEach(clip => clip.style.display = 'none');
        }

        function runImageSequencer() {
            let step = 0;

            function playSequenceLoop() {
                clearAllClips();
                
                if (step === 0) {
                    clips[0].style.display = 'flex';
                    setTimeout(() => { step = 1; playSequenceLoop(); }, 2500); 
                } 
                else if (step === 1) {
                    clips[1].style.display = 'flex';
                    setTimeout(() => { step = 2; playSequenceLoop(); }, 2000); 
                } 
                else if (step === 2) {
                    clips[2].style.display = 'flex'; 
                    setTimeout(() => { step = 3; playSequenceLoop(); }, 2800); 
                } 
                else if (step === 3) {
                    clips[3].style.display = 'flex'; 
                    setTimeout(() => { step = 4; playSequenceLoop(); }, 2200); 
                } 
                else if (step === 4) {
                    clips[4].style.display = 'flex'; 
                    setTimeout(() => { step = 0; playSequenceLoop(); }, 3000); 
                }
            }

            playSequenceLoop();
        }

        function scheduleCourseRepNote() {
            setTimeout(() => {
                repCard.style.display = 'block';
                setTimeout(() => {
                    repCard.classList.add('triggered');
                }, 50);
            }, 20000);
        }
    </script>
</body>
</html>
