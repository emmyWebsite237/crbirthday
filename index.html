<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yara Yara Phonk Birthday Edit ⚡</title>
    <link rel="preconnect" href="googleapis.com">
    <link rel="preconnect" href="gstatic.com" crossorigin>
    <link href="googleapis.com" rel="stylesheet">
    
    <style>
        /* RESET & CORE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #000;
            font-family: 'Archivo Black', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* INITIAL BLURRED INTRO OVERLAY */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .play-trigger {
            background: #ff0055;
            color: #fff;
            border: 4px solid #fff;
            padding: 20px 50px;
            font-size: 2rem;
            text-transform: uppercase;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 30px #ff0055;
            letter-spacing: 2px;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            transition: transform 0.2s ease;
        }

        .play-trigger:hover {
            transform: scale(1.1) skewX(-5deg);
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 50px #00ffcc;
        }

        /* HIDDEN MEDIA ELEMENTS */
        audio {
            display: none;
        }

        /* VIDEO EDIT CONTAINER */
        .timeline-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
            background: #000;
        }

        /* PHONK GLOBAL FLASH FILTER EFFECT */
        .master-strobe {
            animation: globalFlash 0.4s infinite alternate;
        }

        /* BEAT-SYNCED VIDEO SEGMENTS */
        .clip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        /* HARSH BRUTALIST FALLBACK COLORS WHEN IMAGES ARE MISSING */
        .color-fallback-1 { background-color: #ff0055; }
        .color-fallback-2 { background-color: #00ffcc; }
        .color-fallback-3 { background-color: #ffff00; }
        .color-fallback-4 { background-color: #7000ff; }
        .color-fallback-5 { background-color: #ff5500; }

        /* BRUTALIST TYPOGRAPHY TEXT LAYERS */
        .phonk-text {
            font-size: 5rem;
            text-transform: uppercase;
            text-align: center;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -2px;
            font-family: 'Permanent Marker', cursive;
            color: #fff;
            text-shadow: 5px 5px 0px #ff0055, -5px -5px 0px #00ffcc;
            transform: scale(0.5);
        }

        /* SUPER SLOWED PATTERN ANIMATIONS */
        
        /* Clip 1: Heavy Slow-Mo Zoom Drop */
        .slow-zoom {
            animation: slowZoomPulse 0.78s infinite ease-in-out, heavyShake 0.39s infinite;
        }
        .text-pop-1 {
            animation: textGrow 0.78s infinite alternate;
        }

        /* Clip 2: Aggressive Deep-Bass Screen Distortion Wrap */
        .bass-distortion {
            animation: deepGlitchShake 0.18s infinite linear;
        }
        .text-pop-2 {
            animation: textGlitch 0.36s infinite steps(2);
        }

        /* Clip 3: Slow Motion Wobble-Spin Phase Shift */
        .wobble-slow {
            animation: heavyWobble 0.65s infinite linear;
        }
        .text-pop-3 {
            animation: textSkew 0.65s infinite linear;
        }

        /* Clip 4: Heavy Glitch Half-Time Bounce */
        .heavy-bounce {
            animation: slowVerticalBounce 0.45s infinite ease-in-out;
        }
        .text-pop-4 {
            animation: strobeText 0.22s infinite;
        }

        /* Clip 5: Finale Outro Extreme Slow Grind */
        .climax-grind {
            animation: ultimateVibe 0.35s infinite, slowZoomPulse 1.1s infinite;
        }
        .text-pop-5 {
            font-size: 6rem;
            animation: textGrow 0.35s infinite linear;
        }

        /* ====== COMPLEX CSS KEYFRAMES (ADJUSTED FOR SUPER SLOWED CADENCE) ====== */
        
        @keyframes globalFlash {
            0% { filter: brightness(0.9) contrast(110%); }
            100% { filter: brightness(1.6) contrast(170%) saturate(220%); }
        }

        @keyframes slowZoomPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.22); }
            100% { transform: scale(1); }
        }

        @keyframes heavyShake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-6px, 6px) rotate(-1.5deg); }
            50% { transform: translate(6px, -6px) rotate(1.5deg); }
            75% { transform: translate(-6px, -6px) rotate(-1.5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        @keyframes deepGlitchShake {
            0% { transform: translate(0, 0) skewX(0deg); filter: hue-rotate(0deg); }
            33% { transform: translate(-18px, 10px) skewX(-10deg); filter: hue-rotate(120deg); }
            66% { transform: translate(18px, -14px) skewX(12deg); filter: hue-rotate(240deg); }
            100% { transform: translate(0, 0) skewX(0deg); filter: hue-rotate(360deg); }
        }

        @keyframes heavyWobble {
            0% { transform: scale(1.05) rotate(0deg); }
            33% { transform: scale(1.25) rotate(-12deg); }
            66% { transform: scale(0.95) rotate(12deg); }
            100% { transform: scale(1.05) rotate(0deg); }
        }

        @keyframes slowVerticalBounce {
            0% { transform: translateY(0) scaleY(1); }
            30% { transform: translateY(-45px) scaleY(1.15); filter: contrast(180%); }
            60% { transform: translateY(0) scaleY(0.85); }
            100% { transform: translateY(0) scaleY(1); }
        }

        @keyframes ultimateVibe {
            0% { transform: translate(8px, 8px) rotate(2deg) scale(1); }
            50% { transform: translate(-8px, -8px) rotate(-2deg) scale(1.12); filter: saturate(4); }
            100% { transform: translate(8px, -8px) rotate(2deg) scale(1); }
        }

        @keyframes textGrow {
            0% { transform: scale(0.65); opacity: 0.7; }
            100% { transform: scale(1.4); opacity: 1; color: #00ffcc; }
        }

        @keyframes textGlitch {
            0% { transform: translate(8px, -4px) skewX(15deg); clip-path: inset(15% 0 35% 0); }
            50% { transform: translate(-8px, 5px) skewX(-15deg); clip-path: inset(45% 0 10% 0); }
            100% { transform: translate(0, 0); clip-path: inset(0); }
        }

        @keyframes textSkew {
            0% { transform: rotate(-8deg) scale(0.85); color: #ffff00; }
            50% { transform: rotate(8deg) scale(1.2); color: #ff0055; }
            100% { transform: rotate(-8deg) scale(0.85); }
        }

        @keyframes strobeText {
            0%, 49% { background: #000; color: #fff; }
            50%, 100% { background: #fff; color: #000; }
        }
    </style>
</head>
<body>

    <!-- START DROP SCREEN OVERLAY -->
    <div id="intro-overlay">
        <h2 style="font-size: 1.5rem; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 4px; color: #888;">YARA YARA SLOWED DROP 🎧</h2>
        <button class="play-trigger" onclick="startPhonkEdit()">Start Sequence</button>
    </div>

    <!-- MAIN PHONK EDIT AUDIO SOURCE -->
    <!-- Place Elliot Sutton's Super Slowed version MP3 file in this path -->
    <audio id="phonkTrack" src="birthday-audio.mp3" loop></audio>

    <!-- LIVE TIMELINE COMPACT FRAME LAYOUT -->
    <div class="timeline-container master-strobe" id="timeline">
        
        <!-- CLIP 1: Half-Time Bass Intro Build -->
        <div class="clip color-fallback-1 slow-zoom" id="clip1" style="background-image: url('pic1.jpg');">
            <div class="phonk-text text-pop-1">GET READY... ⚡</div>
        </div>

        <!-- CLIP 2: Primary Phonk Cowbell Drop -->
        <div class="clip color-fallback-2 bass-distortion" id="clip2" style="background-image: url('pic2.png');">
            <div class="phonk-text text-pop-2">BIRTHDAY<br>KING 👑</div>
        </div>

        <!-- CLIP 3: Slow Motion Heavy Roll Vocal Hook -->
        <div class="clip color-fallback-3 wobble-slow" id="clip3" style="background-image: url('pic3.jpg');">
            <div class="phonk-text text-pop-3">LEVELED UP<br>💥💥💥</div>
        </div>

        <!-- CLIP 4: Deep Stutter Slow Bass Hit -->
        <div class="clip color-fallback-4 heavy-bounce" id="clip4" style="background-image: url('pic4.png');">
            <div class="phonk-text text-pop-4">YARA YARA 🎶</div>
        </div>

        <!-- CLIP 5: Main Looping Climax Outro -->
        <div class="clip color-fallback-5 climax-grind" id="clip5" style="background-image: url('pic5.jpg');">
            <div class="phonk-text text-pop-5">HBD!!! 🔥</div>
        </div>

    </div>

    <!-- TIMELINE VIDEO CONTROL ENGINE -->
    <script>
        const track = document.getElementById('phonkTrack');
        const overlay = document.getElementById('intro-overlay');
        const timeline = document.getElementById('timeline');
        
        const clips = [
            document.getElementById('clip1'),
            document.getElementById('clip2'),
            document.getElementById('clip3'),
            document.getElementById('clip4'),
            document.getElementById('clip5')
        ];

        function startPhonkEdit() {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
            timeline.style.display = 'block';
            track.play();
            
            runPhonkSequencer();
        }

        function clearAllClips() {
            clips.forEach(clip => clip.style.display = 'none');
        }

        function runPhonkSequencer() {
            let step = 0;

            // Recalculated cut lengths matching the heavy half-time gaps of "Super Slowed" tracks
            function playSequenceLoop() {
                clearAllClips();
                
                if (step === 0) {
                    clips[0].style.display = 'flex'; // Initial low bass sweep
                    setTimeout(() => { step = 1; playSequenceLoop(); }, 2400); 
                } 
                else if (step === 1) {
                    clips[1].style.display = 'flex'; // Distorted main beat impact
                    setTimeout(() => { step = 2; playSequenceLoop(); }, 1800); 
                } 
                else if (step === 2) {
                    clips[2].style.display = 'flex'; // Slow wobble section 
                    setTimeout(() => { step = 3; playSequenceLoop(); }, 2200); 
                } 
                else if (step === 3) {
                    clips[3].style.display = 'flex'; // Deep sub-bass drop stutter
                    setTimeout(() => { step = 4; playSequenceLoop(); }, 1600); 
                } 
                else if (step === 4) {
                    clips[4].style.display = 'flex'; // Climax groove
                    // Loops back to step 1 to mimic a continuous looping stream
                    setTimeout(() => { step = 1; playSequenceLoop(); }, 3200); 
                }
            }

            playSequenceLoop();
        }
    </script>
</body>
</html>
