<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎉</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="googleapis.com">
    <link rel="preconnect" href="gstatic.com" crossorigin>
    <link href="googleapis.com" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Full screen image background with deep overlay */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* REPLACE 'student.jpg' WITH YOUR ACTUAL IMAGE FILENAME OR LINK */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('student.jpg') no-repeat center center/cover;
            filter: blur(8px) scale(1.1);
            z-index: 1;
        }

        /* Centered content wrapper */
        .wrapper {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 2;
        }

        /* Glassmorphism Wish Card */
        .wish-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 480px;
            width: 100%;
            transform: scale(0.9);
            opacity: 0;
            animation: cardEntrance 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Circular framing for the profile picture */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            /* REPLACE 'student.jpg' WITH YOUR ACTUAL IMAGE FILENAME OR LINK */
            background: url('student.jpg') no-repeat center center/cover;
            margin: 0 auto 20px auto;
            border: 4px solid #fff;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            animation: bounce 2s infinite;
        }

        .note-text {
            font-family: 'Caveat', cursive;
            font-size: 1.65rem;
            color: #f1f2f6;
            line-height: 1.5;
            margin-bottom: 30px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        /* Styled Premium Interactive Button */
        .audio-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            outline: none;
        }

        .audio-btn:hover {
            background: #ff6b81;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 71, 87, 0.6);
        }

        .audio-btn:active {
            transform: translateY(-1px);
        }

        /* Layout Animations */
        @keyframes cardEntrance {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

    <!-- Blurred background panel -->
    <div class="background-container"></div>

    <!-- Hidden audio element for ElevenLabs track -->
    <!-- REPLACE 'birthday-audio.mp3' WITH YOUR ACTUAL AUDIO FILENAME -->
    <audio id="birthdayAudio" src="birthday-audio.mp3"></audio>

    <!-- Foreground Interactive Content Card -->
    <div class="wrapper">
        <div class="wish-card">
            <div class="profile-pic"></div>
            <h1>Happy Birthday! 🎂</h1>
            <p class="note-text">
                "To an incredible student and an amazing individual! Wishing you a brilliant year ahead filled with continuous growth, success, and endless joy. Keep shining bright!"
            </p>
            <button class="audio-btn" onclick="toggleAudio()">
                <span id="btn-icon">🔊</span> <span id="btn-text">Listen to Message</span>
            </button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('birthdayAudio');
        const btnIcon = document.getElementById('btn-icon');
        const btnText = document.getElementById('btn-text');

        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                btnIcon.innerText = "⏸️";
                btnText.innerText = "Pause Message";
            } else {
                audio.pause();
                btnIcon.innerText = "🔊";
                btnText.innerText = "Listen to Message";
            }
        }

        // Reset button when audio file finishes playing naturally
        audio.onended = function() {
            btnIcon.innerText = "🔊";
            btnText.innerText = "Listen to Message";
        };
    </script>
</body>
</html>
